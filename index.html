<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seblak Jamet - Loyalty (GitHub Edition)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Library Scan QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <!-- Library Generate QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdf2f2; -webkit-tap-highlight-color: transparent; }
    .bg-jamet { background: linear-gradient(135deg, #e11d48 0%, #fb923c 100%); }
    .view-section { display: none; }
    .view-section.active { display: block; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  </style>
</head>
<body class="min-h-screen">

  <div id="loading" class="loading-overlay flex-col gap-4">
    <div class="w-12 h-12 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="font-black text-red-600 text-xs uppercase tracking-widest">Memproses...</p>
  </div>

  <!-- Header -->
  <header class="bg-jamet text-white pt-8 pb-12 px-6 rounded-b-[3rem] shadow-xl relative z-10">
    <div class="max-w-md mx-auto flex justify-between items-start">
      <div>
        <h1 class="text-3xl font-black tracking-tight leading-tight">Seblak Jamet</h1>
        <div class="flex items-center gap-2 mt-1">
          <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
          <p class="text-[10px] font-bold opacity-90 uppercase tracking-widest">GitHub Hosted System</p>
        </div>
      </div>
      <button id="btnLogout" onclick="logout()" class="hidden bg-white/20 p-3 rounded-2xl backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7" />
        </svg>
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto px-5 -mt-6 pb-20 relative z-20">
    
    <!-- LOGIN -->
    <section id="loginView" class="view-section active">
      <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-red-50 text-center">
        <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">🌶️</div>
        <h2 class="text-2xl font-black mb-6 text-gray-800">Selamat Datang!</h2>
        <form id="loginForm" class="space-y-4">
          <input type="tel" id="loginNoHp" placeholder="Masukkan No HP" class="w-full px-6 py-4 rounded-2xl border-none bg-gray-100 font-bold outline-none ring-2 ring-transparent focus:ring-red-500/20 transition-all">
          <input type="password" id="loginPin" maxlength="6" placeholder="PIN 6 Digit" class="w-full px-6 py-4 rounded-2xl border-none bg-gray-100 text-center tracking-[0.5em] font-bold outline-none ring-2 ring-transparent focus:ring-red-500/20 transition-all">
          <button type="submit" class="w-full bg-jamet text-white font-black py-5 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all uppercase">Masuk Akun</button>
        </form>
        <button onclick="switchView('registerView')" class="mt-8 text-red-500 font-bold text-sm">Belum punya akun? <span class="underline">Daftar</span></button>
      </div>
    </section>

    <!-- REGISTER -->
    <section id="registerView" class="view-section">
      <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-red-50">
        <h2 class="text-2xl font-black mb-6 text-gray-800 text-center">Daftar Member</h2>
        <form id="regForm" class="space-y-4">
          <input type="text" id="regNama" placeholder="Nama Lengkap" class="w-full px-6 py-4 rounded-2xl bg-gray-100 outline-none font-bold">
          <input type="tel" id="regNoHp" placeholder="No WhatsApp (Aktif)" class="w-full px-6 py-4 rounded-2xl bg-gray-100 outline-none font-bold">
          <input type="password" id="regPin" maxlength="6" placeholder="Buat PIN 6 Digit" class="w-full px-6 py-4 rounded-2xl bg-gray-100 text-center tracking-[0.3em] font-bold outline-none">
          <button type="submit" class="w-full bg-black text-white font-black py-5 rounded-2xl shadow-lg uppercase">Buat Akun Sekarang</button>
        </form>
        <button onclick="switchView('loginView')" class="w-full mt-6 text-gray-400 text-[10px] font-black uppercase text-center">← Kembali ke Login</button>
      </div>
    </section>

    <!-- ADMIN VIEW -->
    <section id="adminView" class="view-section space-y-6">
      <div class="bg-white p-6 rounded-[2rem] shadow-xl">
        <div class="flex items-center justify-between mb-6">
          <h3 class="font-black text-gray-800">Daftar Member</h3>
          <button onclick="openScannerModal()" class="bg-red-600 text-white p-4 rounded-2xl shadow-lg active:scale-90 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /></svg>
            <span class="font-bold text-sm uppercase">Scan Member</span>
          </button>
        </div>
        
        <input type="text" id="searchInput" onkeyup="filterMember()" placeholder="Cari Nama/No HP..." class="w-full px-6 py-4 rounded-2xl bg-gray-50 border border-gray-100 mb-6 font-bold text-sm">

        <div id="memberList" class="space-y-3">
          <!-- Member list will be here -->
        </div>
      </div>
    </section>

    <!-- MEMBER VIEW -->
    <section id="memberView" class="view-section">
      <div class="bg-white p-8 rounded-[3rem] shadow-2xl text-center">
          <div id="userInitial" class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-4xl font-black mx-auto mb-4 border-4 border-white shadow-lg">?</div>
          <h2 id="userNama" class="text-2xl font-black text-gray-800 leading-tight">...</h2>
          <p id="userNoHp" class="text-gray-400 font-bold text-xs mb-8">...</p>
          
          <div class="bg-gradient-to-br from-red-50 to-orange-50 p-6 rounded-[2.5rem] border border-red-100">
            <div class="flex justify-between items-end mb-4">
              <span class="text-[10px] font-black text-red-800 uppercase tracking-widest">Koleksi Poin</span>
              <div class="text-right">
                  <span id="userTotal" class="text-5xl font-black text-red-600">0</span>
                  <span class="text-gray-400 font-bold text-sm">/10</span>
              </div>
            </div>
            <div class="w-full bg-white h-5 rounded-full p-1 shadow-inner overflow-hidden">
              <div id="userProgressBar" class="h-full bg-jamet rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
            <div id="claimArea" class="mt-8 hidden">
               <button onclick="showMemberQR()" class="w-full bg-black text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                 <span class="text-xl">🎁</span> KLAIM HADIAH
               </button>
            </div>
          </div>
          <p class="mt-6 text-[10px] text-gray-300 font-bold uppercase tracking-widest">Auto Sync Aktif</p>
      </div>
    </section>
  </main>

  <!-- MODAL SCANNER -->
  <div id="scannerModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-5">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeScannerModal()"></div>
    <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md relative z-10 shadow-2xl text-center">
      <h3 class="text-xl font-black mb-6 text-gray-800">Scan QR Member</h3>
      
      <div id="reader" class="overflow-hidden rounded-[1.5rem] border-4 border-gray-100 mb-6"></div>

      <div class="flex gap-2">
        <input type="tel" id="manualNoHp" placeholder="Atau No HP Manual..." class="flex-1 bg-gray-100 border-none px-5 py-4 rounded-2xl font-bold text-sm outline-none">
        <button onclick="handleManualInput()" class="bg-black text-white px-6 py-4 rounded-2xl font-black text-sm">CEK</button>
      </div>

      <button onclick="closeScannerModal()" class="mt-8 text-gray-400 font-bold text-[10px] uppercase tracking-[0.2em]">Batal</button>
    </div>
  </div>

  <!-- MODAL QR MEMBER -->
  <div id="memberQRModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeMemberQR()"></div>
    <div class="bg-white rounded-[3rem] p-10 w-full max-w-xs relative z-10 text-center shadow-2xl">
      <div id="qrcode" class="flex justify-center mb-8 p-5 bg-white rounded-3xl shadow-inner border border-gray-50"></div>
      <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-8">Tunjukkan ke Admin</p>
      <button onclick="closeMemberQR()" class="w-full py-5 bg-gray-100 rounded-2xl font-black text-gray-400 uppercase">Tutup</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRJhJc6xwiZua6lMIE_AFsmycjVsdUC_d3g6xMr_5GMU753f5spMKrepEiUMQvPVKeQg/exec";
    
    let loggedInUserNoHp = null;
    let html5QrCode = null;
    let autoRefreshTimer = null; // Timer untuk sinkronisasi otomatis

    async function callGAS(action, data = {}, showLoader = true) {
      if (showLoader) document.getElementById('loading').style.display = 'flex';
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action, data })
        });
        const result = await response.json();
        return result;
      } catch (e) {
        console.error(e);
      } finally {
        if (showLoader) document.getElementById('loading').style.display = 'none';
      }
    }

    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      document.getElementById('btnLogout').classList.toggle('hidden', viewId === 'loginView' || viewId === 'registerView');
      
      // Stop auto refresh jika bukan di halaman member
      if (viewId !== 'memberView') {
        clearInterval(autoRefreshTimer);
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const hp = document.getElementById('loginNoHp').value;
      const pin = document.getElementById('loginPin').value;
      
      const res = await callGAS('loginUser', { hp, pin });
      if(res && res.success) {
        if(res.role === 'admin') {
          switchView('adminView');
          refreshAdminData();
        } else {
          loggedInUserNoHp = res.data.noHp.toString();
          switchView('memberView');
          renderDashboard(res.data);
          startAutoRefresh(); // Mulai sinkronisasi otomatis
        }
      } else {
        alert(res ? res.message : "Gagal Login");
      }
    });

    // FUNGSI SINKRONISASI OTOMATIS (Tanpa Reload)
    function startAutoRefresh() {
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      
      // Cek ke server setiap 5 detik
      autoRefreshTimer = setInterval(async () => {
        if (loggedInUserNoHp) {
          // callGAS dengan parameter ketiga 'false' agar tidak muncul loading overlay yang mengganggu
          const res = await callGAS('getMemberData', { noHp: loggedInUserNoHp }, false);
          if (res) {
            renderDashboard(res);
          }
        }
      }, 5000); 
    }

    function renderDashboard(data) {
      const currentTotal = document.getElementById('userTotal').innerText;
      
      // Hanya update jika ada perubahan data agar tidak berkedip
      if (currentTotal != data.total) {
        document.getElementById('userNama').innerText = data.nama;
        document.getElementById('userNoHp').innerText = data.noHp;
        document.getElementById('userInitial').innerText = data.nama.charAt(0).toUpperCase();
        document.getElementById('userTotal').innerText = data.total;
        
        const progress = Math.min((data.total / 10) * 100, 100);
        document.getElementById('userProgressBar').style.width = progress + '%';
        document.getElementById('claimArea').classList.toggle('hidden', data.total < 10);
      }
    }

    // --- SISANYA TETAP SAMA ---

    document.getElementById('regForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const nama = document.getElementById('regNama').value;
      const noHp = document.getElementById('regNoHp').value;
      const pin = document.getElementById('regPin').value;
      const res = await callGAS('registerMember', { nama, noHp, pin });
      if(res && res.success) {
        alert("Pendaftaran Berhasil!");
        switchView('loginView');
      }
    });

    async function refreshAdminData() {
      const members = await callGAS('getAllMembers');
      const list = document.getElementById('memberList');
      if(!members) return;
      list.innerHTML = members.map(m => `
        <div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center member-card" data-search="${m.nama} ${m.noHp}">
          <div>
            <p class="font-black text-gray-800 text-sm leading-tight">${m.nama}</p>
            <p class="text-[10px] font-bold text-red-500 uppercase">${m.noHp} • ${m.total} Poin</p>
          </div>
          <button onclick="addPoint('${m.noHp}')" class="bg-white w-10 h-10 rounded-xl shadow-sm border border-gray-100 flex items-center justify-center active:scale-90 transition-all">🔥</button>
        </div>
      `).join('');
    }

    async function addPoint(noHp) {
      await callGAS('addPurchase', { noHp });
      refreshAdminData();
    }

    function openScannerModal() {
      document.getElementById('scannerModal').classList.remove('hidden');
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
          stopScanner();
          handleScannedMember(decodedText);
      });
    }

    function stopScanner() {
      if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scannerModal').classList.add('hidden'));
    }

    function closeScannerModal() { stopScanner(); }

    async function handleScannedMember(noHp) {
      const member = await callGAS('getMemberData', { noHp });
      if(member) {
        if(member.total >= 10) {
          if(confirm(`Member ${member.nama} punya ${member.total} poin. Tukar hadiah?`)) {
            await callGAS('resetReward', { noHp });
            alert("Klaim Berhasil!");
            refreshAdminData();
          }
        } else {
          alert(`Poin ${member.nama} baru ${member.total}/10.`);
        }
      }
    }

    function handleManualInput() {
      const hp = document.getElementById('manualNoHp').value;
      if(hp) { stopScanner(); handleScannedMember(hp); }
    }

    function showMemberQR() {
      document.getElementById('qrcode').innerHTML = "";
      new QRCode(document.getElementById("qrcode"), { text: loggedInUserNoHp, width: 180, height: 180 });
      document.getElementById('memberQRModal').classList.remove('hidden');
    }
    
    function closeMemberQR() { document.getElementById('memberQRModal').classList.add('hidden'); }
    function logout() { clearInterval(autoRefreshTimer); location.reload(); }
    function filterMember() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('.member-card').forEach(c => {
        c.style.display = c.dataset.search.toLowerCase().includes(q) ? 'flex' : 'none';
      });
    }
  </script>
</body>
</html>
